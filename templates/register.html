{% extends "base.html" %}

{% block title %}注册 - 我的个人博客{% endblock %}

{% block content %}
    <h2>注册</h2>
    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required style="width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd;">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required style="width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd;">
        </div>
        <div class="form-group">
            <label for="email">邮箱</label>
            <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd;">
        </div>
        <button type="submit" style="background-color: #4CAF50; color: white; padding: 10px 15px; border: none; cursor: pointer;">注册</button>
        <p style="margin-top: 10px;">已有账号？ <a href="{{ url_for('login_route') }}">登录</a></p>
    </form>
{% endblock %}

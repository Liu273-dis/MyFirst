{% extends "base.html" %}

{% block title %}编辑文章 - 我的个人博客{% endblock %}

{% block content %}
    <h2>编辑文章</h2>
    <form method="POST">
        <div class="form-group">
            <label for="title">标题</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>
        <div class="form-group">
            <label for="author">作者</label>
            <input type="text" id="author" name="author" value="{{ post.author }}" required>
        </div>
        <div class="form-group">
            <label for="content">内容</label>
            <textarea id="content" name="content" rows="10" required>{{ post.content }}</textarea>
        </div>
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
            <button type="submit" class="btn btn-primary">更新文章</button>
            <a href="{{ url_for('post', post_id=post.id) }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
{% endblock %}

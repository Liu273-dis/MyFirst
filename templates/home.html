{% extends "base.html" %}

{% block title %}首页 - 我的个人博客{% endblock %}

{% block content %}
    <div class="scrollable-content">
        <h2>博客文章</h2>
        {% for post in posts %}
            <div class="post">
                <h3><a href="{{ url_for('post', post_id=post.id) }}">{{ post.title }}</a></h3>
                <p class="post-meta">作者: {{ post.author }} | 发布日期: {{ post.date_posted }}</p>
                <div class="post-content">
                    {{ post.content[:100] }}...
                </div>
                <div class="post-actions">
                    <a href="{{ url_for('post', post_id=post.id) }}" class="btn btn-secondary">阅读更多</a>
                    <a href="{{ url_for('edit_post', post_id=post.id) }}" class="btn btn-primary">编辑</a>
                    <button type="button" onclick="showDeleteConfirm({{ post.id }})" class="btn btn-danger">删除</button>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
